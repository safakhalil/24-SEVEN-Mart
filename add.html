<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mart — Add Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='addpage.css') }}">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-wrap">
        <div class="grid-lines"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="scan-line"></div>
        <div id="particles"></div>
    </div>

    <!-- Main Card -->
    <div class="wrapper">

        <!-- Left Panel -->
        <div class="left">
            <div class="shelf"></div>
            <div class="shelf"></div>
            <div class="shelf"></div>
            <div class="shelf-dots" id="shelfDots"></div>
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="box-center">📦</div>
            <div class="left-logo">24/7 <span>Smart</span> Mart</div>
            <div>
                <p class="tagline"><strong>Expand Your Inventory,</strong><br>One Product at a Time</p>
                <div class="dots-nav">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right">
            <div class="status-row">
                <div class="status-dot"></div>
                Inventory Management &nbsp;·&nbsp; Add New Product
            </div>

            <h1>Add Product</h1>
            <p class="subtitle">Fill in the details below to add a new item to the store.</p>

            <form action="" method="POST">

                <div class="field">
                    <label>Product Name</label>
                    <div class="input-wrap">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        <input type="text" name="name" placeholder="Enter product name" required autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label>Price</label>
                    <div class="input-wrap">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        <input type="number" name="price" placeholder="0.00" step="0.01" min="0" required autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label>Quantity</label>
                    <div class="input-wrap">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        <input type="number" name="quantity" placeholder="0" min="0" required autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label>Category</label>
                    <div class="input-wrap">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2z"/>
                        </svg>
                        <input type="text" name="category" placeholder="e.g. Beverages, Snacks..." required autocomplete="off">
                    </div>
                </div>

                <button class="btn" type="submit">Add to Inventory</button>

            </form>

            <div class="divider">or</div>

            <a href="/dashboard" class="back-link">&#8592; Back to Dashboard</a>
        </div>

    </div>

    <script>
        // Generate floating particles
        const pCont = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `left:${Math.random()*100}%;bottom:0;--d:${7+Math.random()*10}s;--dl:${-Math.random()*15}s`;
            pCont.appendChild(p);
        }

        // Generate shelf dots
        const sd = document.getElementById('shelfDots');
        [25, 50, 75].forEach(top => {
            for (let i = 0; i < 6; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.cssText = `top:calc(${top}% - 4px);left:${8+i*16}%;--bd:${2+Math.random()*3}s;--bdl:${-Math.random()*4}s`;
                sd.appendChild(d);
            }
        });
    </script>

</body>
</html>
