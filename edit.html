<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Mart — Edit Product</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='edit.css') }}">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-wrap">
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scan-line"></div>
    <div id="particles"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">24/7 <span>Smart</span> Mart</div>
        <h1>Edit Product</h1>
        <div class="status-row">
          <div class="status-dot"></div>
          Inventory Management &nbsp;·&nbsp; Staff Access
        </div>
      </div>
      <a href="/product" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Products
      </a>
    </div>

    <!-- Form Card -->
    <div class="form-card">

      <div class="form-card-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Update Product Details
      </div>

      <form method="POST" class="edit-form">

        <!-- Two-column grid: Name + Price -->
        <div class="field-row">

          <div class="field">
            <label>Product Name</label>
            <div class="input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              </svg>
              <input type="text" name="name" value="{{p.name}}" placeholder="Product name">
            </div>
          </div>

          <div class="field">
            <label>Price</label>
            <div class="input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              <input type="text" name="price" value="{{p.price}}" placeholder="0.00">
            </div>
          </div>

        </div>

        <!-- Two-column grid: Quantity + Category -->
        <div class="field-row">

          <div class="field">
            <label>Quantity</label>
            <div class="input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
              <input type="number" name="quantity" value="{{p.quantity}}" placeholder="0" min="0">
            </div>
          </div>

          <div class="field">
            <label>Category</label>
            <div class="input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <input type="text" name="category" value="{{p.category}}" placeholder="Category">
            </div>
          </div>

        </div>

        <!-- Divider -->
        <div class="form-divider"></div>

        <!-- Actions -->
        <div class="form-actions">
          <a href="/product" class="cancel-btn">Cancel</a>
          <button class="update-btn" type="submit">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Update Product
          </button>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="secure-note">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Smart Mart Security &nbsp;·&nbsp; Staff use only
      </div>
      <a href="/product" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Products
      </a>
    </div>

  </div>

  <script>
    const pCont = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;bottom:0;--d:${7+Math.random()*10}s;--dl:${-Math.random()*15}s`;
      pCont.appendChild(p);
    }
  </script>

</body>
</html>
