<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Mart — Receipt</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='receipt.css') }}">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-wrap">
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scan-line"></div>
    <div id="particles"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">24/7 <span>Smart</span> Mart</div>
        <h1>Receipt</h1>
        <div class="status-row">
          <div class="status-dot"></div>
          Transaction Complete &nbsp;·&nbsp; Staff Access
        </div>
      </div>
      <div class="receipt-meta">
        <div class="meta-pill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="receiptDate"></span>
        </div>
        <div class="meta-pill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          TXN #<span id="txnId"></span>
        </div>
      </div>
    </div>

    <!-- Receipt Card -->
    <div class="receipt-card">

      <!-- Table Header -->
      <div class="receipt-header">
        <div class="rh-col rh-name">Item</div>
        <div class="rh-col rh-qty">Qty</div>
        <div class="rh-col rh-total">Total</div>
      </div>

      <!-- Cart Items -->
      <div class="receipt-body">
        {% for item in cart %}
        <div class="receipt-row">
          <div class="ri-name">{{ item.name }}</div>
          <div class="ri-qty"><span class="qty-badge">x{{ item.quantity }}</span></div>
          <div class="ri-total">{{ item.total }}</div>
        </div>
        {% endfor %}
      </div>

      <!-- Divider -->
      <div class="receipt-divider">
        <span></span><span class="divider-label">Summary</span><span></span>
      </div>

      <!-- Grand Total -->
      <div class="grand-total-row">
        <div class="grand-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Grand Total
        </div>
        <div class="grand-amount">{{ total }}</div>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="secure-note">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Smart Mart Security &nbsp;·&nbsp; Staff use only
      </div>
      <a href="/dashboard" class="finish-btn">
        Finish &amp; Close
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

  </div>

  <script>
    const pCont = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;bottom:0;--d:${7+Math.random()*10}s;--dl:${-Math.random()*15}s`;
      pCont.appendChild(p);
    }
    document.getElementById('receiptDate').textContent = new Date().toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    document.getElementById('txnId').textContent = Math.floor(100000 + Math.random() * 900000);
  </script>

</body>
</html>
